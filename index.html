<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Fateen OS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>FATEEN HOTEL</h2>
        <a href="dashboard.html" class="nav-link active">الرئيسية</a>
        <a href="frontdesk.html" class="nav-link">الاستقبال</a>
        <a href="reservations.html" class="nav-link">الحجوزات</a>
        <a href="crm.html" class="nav-link">العملاء</a>
    </div>
    <div class="container">
        <h1>مرحباً بك في نظام الإدارة</h1>
        <div style="display: flex; gap: 20px;">
            <div class="card" style="flex: 1;">
                <h3>نسبة الإشغال اليوم</h3>
                <h2 style="color: var(--primary-cyan);">75%</h2>
            </div>
            <div class="card" style="flex: 1;">
                <h3>إيرادات المتوقعة</h3>
                <h2 style="color: var(--primary-cyan);">12,500 ج.م</h2>
            </div>
        </div>
        <div class="card">
            <h3>مخطط الحجوزات الأسبوعي</h3>
            <canvas id="myChart" height="100"></canvas>
        </div>
    </div>
    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'],
                datasets: [{
                    label: 'الحجوزات',
                    data: [12, 19, 10, 15, 22, 30, 25],
                    borderColor: '#00f2fe',
                    tension: 0.4
                }]
            }
        });
    </script>
</body>
</html>
