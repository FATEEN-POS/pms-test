<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>الاستقبال | خريطة الغرف</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .room-card { background: #1a1a1a; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; position: relative; }
        .available { border-top: 5px solid #00ff88; }
        .occupied { border-top: 5px solid #ff4444; }
        .cleaning { border-top: 5px solid #ffbb00; }
        .room-card span { display: block; margin-top: 10px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <div class="sidebar">... (نفس السايدبار) ...</div>
    <div class="container">
        <h1>حالة الغرف الحالية</h1>
        <div class="rooms-grid" id="roomsDisplay">
            <div class="room-card available"><h3>101</h3><span>متاحة - Double</span></div>
            <div class="room-card occupied"><h3>102</h3><span>مشغولة - Suite</span></div>
        </div>
    </div>
    <div class="card">
    <h3>إضافة خدمات إضافية على الغرفة</h3>
    <div class="modal-form">
        <input type="text" id="targetRoom" placeholder="رقم الغرفة">
        <select id="serviceType">
            <option value="Laundry">مغسلة</option>
            <option value="Restaurant">مطعم</option>
            <option value="MiniBar">ميني بار</option>
        </select>
        <input type="number" id="servicePrice" placeholder="التكلفة">
        <button onclick="addService()">إضافة للفاتورة</button>
    </div>
</div>

<script>
async function addService() {
    const data = {
        sheet: "Services", // تأكد من وجود صفحة بهذا الاسم في الشيت
        action: "add",
        data: {
            room_id: document.getElementById('targetRoom').value,
            service: document.getElementById('serviceType').value,
            amount: document.getElementById('servicePrice').value,
            date: new Date().toLocaleDateString()
        }
    };
    await fetch('YOUR_API_URL', { method: 'POST', body: JSON.stringify(data) });
    alert("تمت إضافة الخدمة لحساب الغرفة");
}
</script>
</body>
</html>
