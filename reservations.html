<div class="container">
    <h1>تسجيل حجز جديد (Check-in)</h1>
    <div class="card">
        <div class="modal-form">
            <input type="text" id="gName" placeholder="اسم النزيل بالكامل" class="full-width">
            <input type="text" id="gID" placeholder="رقم البطاقة / الباسبورت">
            <input type="text" id="gPhone" placeholder="رقم الموبايل">
            <input type="text" id="rSelected" placeholder="رقم الغرفة المحجوزة">
            <input type="number" id="nights" placeholder="عدد الليالي">
            <input type="date" id="checkInDate">
            <button class="full-width" onclick="confirmBooking()">تأكيد الحجز وتسكين النزيل</button>
        </div>
    </div>
</div>

<script>
async function confirmBooking() {
    const bookingId = "BK-" + Math.floor(Math.random() * 1000);
    const payload = {
        sheet: "Bookings",
        action: "add",
        data: {
            id: bookingId,
            guest_name: document.getElementById('gName').value,
            room_id: document.getElementById('rSelected').value,
            check_in: document.getElementById('checkInDate').value,
            nights: document.getElementById('nights').value,
            status: "Confirmed"
        }
    };
    // إرسال البيانات
    await fetch('YOUR_API_URL', { method: 'POST', body: JSON.stringify(payload) });
    
    // تحديث حالة الغرفة تلقائياً لـ Occupied
    const updateRoom = {
        sheet: "Rooms",
        action: "update",
        data: { id: document.getElementById('rSelected').value, status: "Occupied" }
    };
    await fetch('YOUR_API_URL', { method: 'POST', body: JSON.stringify(updateRoom) });
    
    alert("تم التسكين بنجاح وتحديث حالة الغرفة!");
}
</script>
