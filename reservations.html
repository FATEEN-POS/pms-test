<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحجوزات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">...</div>
    <div class="container">
        <h1>تسجيل حجز جديد</h1>
        <div class="card" style="max-width: 600px;">
            <div style="display: flex; flex-direction: column;">
                <label>اسم العميل</label>
                <input type="text" id="guestName" placeholder="أدخل اسم النزيل">
                
                <label>نوع الغرفة</label>
                <select id="roomType">
                    <option>Single</option>
                    <option>Double</option>
                    <option>Suite</option>
                </select>

                <label>تاريخ الوصول</label>
                <input type="date" id="checkIn">
                
                <label>تاريخ المغادرة</label>
                <input type="date" id="checkOut">

                <button onclick="submitBooking()">تأكيد وتسجيل في الشيت</button>
            </div>
        </div>
    </div>
    <script>
        async function submitBooking() {
            // كود الـ Fetch لإرسال البيانات للرابط بتاعك (POST)
            alert('تم إرسال البيانات للجوجل شيت بنجاح');
        }
    </script>
</body>
</html>
